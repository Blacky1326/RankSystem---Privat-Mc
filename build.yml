name: Build RankSystem Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Manuell starten per Knopfdruck

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Java 21 installieren
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle Setup
        uses: gradle/actions/setup-gradle@v3

      - name: Plugin bauen
        run: ./gradlew build

      - name: JAR hochladen (Download)
        uses: actions/upload-artifact@v4
        with:
          name: RankSystem-Plugin
          path: build/libs/RankSystem-1.0.0.jar
          retention-days: 30
