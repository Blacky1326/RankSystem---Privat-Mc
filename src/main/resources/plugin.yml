name: RankSystem
version: 1.0.0
main: de.rankSystem.RankSystem
api-version: '1.21'
author: YourName
description: Neon Rank System mit LuckPerms, Tab-Liste, Chat-Prefix, Moderation

depend:
  - LuckPerms

commands:
  rank:
    description: Rang-Verwaltung
    usage: /rank <set|info|list|reload> [Spieler] [Rang]
    permission: ranksystem.admin

  warn:
    description: Spieler verwarnen
    usage: /warn <Spieler> <Grund>
    permission: ranksystem.mod

  warnings:
    description: Verwarnungen eines Spielers anzeigen
    usage: /warnings [Spieler]
    permission: ranksystem.mod

  mute:
    description: Spieler muten
    usage: /mute <Spieler> <Dauer> [Grund]
    permission: ranksystem.mod

  unmute:
    description: Spieler entmuten
    usage: /unmute <Spieler>
    permission: ranksystem.mod

  tempban:
    description: Spieler temporär bannen
    usage: /tempban <Spieler> <Dauer> [Grund]
    permission: ranksystem.admin

  sc:
    description: Staff-Chat
    usage: /sc <Nachricht> | /sc toggle
    permission: ranksystem.mod
    aliases: [staffchat]

  staffchat:
    description: Staff-Chat (Alias)
    usage: /staffchat <Nachricht>
    permission: ranksystem.mod

permissions:
  # Admin-Permissions
  ranksystem.admin:
    description: Zugriff auf /rank, /tempban Befehle
    default: op

  ranksystem.mod:
    description: Moderator-Funktionen (warn, mute, sc)
    default: false

  # Rang-Permissions (von LuckPerms automatisch vergeben)
  ranksystem.rank.owner:
    description: Owner-Rang
    default: false
  ranksystem.rank.admin:
    description: Admin-Rang
    default: false
  ranksystem.rank.moderator:
    description: Moderator-Rang
    default: false
  ranksystem.rank.supporter:
    description: Supporter-Rang
    default: false
  ranksystem.rank.streamer:
    description: Streamer-Rang
    default: false
  ranksystem.rank.vip:
    description: VIP-Rang
    default: false
  ranksystem.rank.mitglied:
    description: Mitglied-Rang
    default: true

  ranksystem.support:
    description: Supporter-Funktionen
    default: false
  ranksystem.vip:
    description: VIP-Funktionen
    default: false
  ranksystem.streamer:
    description: Streamer-Funktionen
    default: false
