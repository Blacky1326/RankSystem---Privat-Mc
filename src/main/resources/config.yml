# ╔══════════════════════════════╗
# ║     RankSystem Config        ║
# ╚══════════════════════════════╝

# Config-Version – NICHT manuell ändern! Wird vom Plugin für Auto-Migration genutzt.
config-version: 1

# Tab-Liste Header & Footer
tab:
  header:
    - "<gradient:#FF0000:#FFD700><bold>✦ Dein Server ✦</bold></gradient>"
    - "<gray>Spieler online: <white>%players%</white></gray>"
  footer:
    - "<gradient:#00BFFF:#9400D3>discord.gg/deinserver</gradient>"

# Chat Format
chat:
  format: "%prefix% %name%<dark_gray>: </dark_gray>%message%"

# Login-Screen Einstellungen
login:
  title: "<gradient:#FF0000:#FFD700><bold>✦ Willkommen ✦</bold></gradient>"
  subtitle: "<gray>Schön dass du da bist, <white>%name%</white>!</gray>"
  chat:
    - ""
    - "<gradient:#FF0000:#FFD700>━━━━━━━━━━━━━━━━━━━━━━━━━━━</gradient>"
    - "  <gradient:#FF0000:#FFD700><bold>✦ Willkommen auf Dein Server! ✦</bold></gradient>"
    - "  <gray>Hey <white>%name%</white>, schön dass du da bist!"
    - "  <gray>Dein Rang: <white>%rank%</white>"
    - "  <gray>» </gray>%discord%"
    - "<gradient:#FF0000:#FFD700>━━━━━━━━━━━━━━━━━━━━━━━━━━━</gradient>"
    - ""
  duration: 5

# Join & Leave Nachrichten
messages:
  join: "%prefix% <gray>%name% ist dem Server beigetreten.</gray>"
  quit: "%prefix% <gray>%name% hat den Server verlassen.</gray>"
  no_permission: "<red>✗ Du hast keine Berechtigung!</red>"
  rank_set: "<green>✔ Rang von <white>%target%</white> auf %rank% <green>gesetzt!</green>"
  rank_received: "<gray>Dein Rang wurde auf %rank% <gray>gesetzt!</gray>"

# Ränge
ranks:
  owner:
    display: "OWNER"
    prefix: "<gradient:#FF0000:#FF6B00><bold>[OWNER]</bold></gradient>"
    weight: 1
    permission: "ranksystem.rank.owner"
  admin:
    display: "Admin"
    prefix: "<gradient:#FF4500:#FFD700><bold>[ADMIN]</bold></gradient>"
    weight: 2
    permission: "ranksystem.rank.admin"
  moderator:
    display: "Moderator"
    prefix: "<gradient:#00BFFF:#7B68EE><bold>[MOD]</bold></gradient>"
    weight: 3
    permission: "ranksystem.rank.moderator"
  supporter:
    display: "Supporter"
    prefix: "<gradient:#00FF7F:#00CED1><bold>[SUP]</bold></gradient>"
    weight: 4
    permission: "ranksystem.rank.supporter"
  streamer:
    display: "Streamer"
    prefix: "<gradient:#9400D3:#FF1493><bold>[STREAM]</bold></gradient>"
    weight: 5
    permission: "ranksystem.rank.streamer"
  vip:
    display: "VIP"
    prefix: "<gradient:#FFD700:#FFA500><bold>[VIP]</bold></gradient>"
    weight: 6
    permission: "ranksystem.rank.vip"
  mitglied:
    display: "Mitglied"
    prefix: "<gray>[Mitglied]</gray>"
    weight: 7
    permission: "ranksystem.rank.mitglied"

# Discord
discord:
  url: "discord.gg/deinserver"

# Actionbar
actionbar:
  interval: 4
  lines:
    - "<gradient:#FF0000:#FFD700>✦ Dein Server</gradient> <dark_gray>|</dark_gray> <gray>Rang: <white>%rank%</white></gray>"
    - "<gradient:#00BFFF:#9400D3>✦ Dein Server</gradient> <dark_gray>|</dark_gray> <gray>Spieler online: <white>%online%</white></gray>"
    - "<gradient:#00FF7F:#00CED1>✦ Dein Server</gradient> <dark_gray>|</dark_gray> <gray>Ping: <white>%ping%ms</white></gray>"
    - "<gradient:#FF0000:#FFD700>✦ Dein Server</gradient> <dark_gray>|</dark_gray> <gradient:#00BFFF:#9400D3>discord.gg/deinserver</gradient>"

# MOTD (Serverbeschreibung in der Serverliste)
motd:
  enabled: true
  line1: "<gradient:#FF0000:#FFD700><bold>✦ Dein Server ✦</bold></gradient>"
  line2: "<gray>➜ <white>%online%</white> Spieler online <dark_gray>| </dark_gray><gradient:#00BFFF:#9400D3>discord.gg/deinserver</gradient></gray>"
  fake-max: 100

# Vanish
vanish:
  fake-quit: "%prefix% <gray>%name% hat den Server verlassen.</gray>"
  fake-join: "%prefix% <gray>%name% ist dem Server beigetreten.</gray>"

# Teleport
teleport:
  # Cooldown in Sekunden für normale Spieler nach /tpa
  cooldown: 60
  # Countdown in Sekunden bevor teleportiert wird (nach Annehmen)
  countdown: 5
  # Nach wie vielen Sekunden läuft eine offene Anfrage ab
  request-timeout: 30
  # Toleranz in Blöcken – wird die Distanz überschritten, wird Teleport abgebrochen
  move-tolerance: 0.22
